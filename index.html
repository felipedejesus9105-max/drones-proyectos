<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGDrones — Gestión de Proyectos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');
:root {
  --bg:#070b12; --bg2:#0d1420; --bg3:#111c2e; --panel:#0a1628; --border:#1a2f4a;
  --accent:#00d4ff; --accent2:#ff6b00; --text:#c8daf0; --text2:#6a8aaa;
  --danger:#ff3355; --warn:#ffbb00; --success:#00ff88;
  --glow:0 0 20px rgba(0,212,255,0.3); --glow2:0 0 20px rgba(255,107,0,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}

/* LOADING */
#loading-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity 0.4s;}
#loading-screen.hide{opacity:0;pointer-events:none;}
.loader-ring{width:60px;height:60px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:3px;color:var(--text2);}

/* TOAST */
#toast{position:fixed;bottom:2rem;right:2rem;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast-item{background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);padding:12px 18px;font-size:0.88rem;min-width:260px;animation:toastIn 0.3s ease;pointer-events:auto;}
.toast-item.error{border-left-color:var(--danger);}
.toast-item.success{border-left-color:var(--success);}
@keyframes toastIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}

/* HEADER */
header{position:relative;z-index:10;background:linear-gradient(180deg,rgba(0,212,255,0.08) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:70px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:42px;height:42px;}
.logo-icon svg{width:100%;height:100%;filter:drop-shadow(0 0 8px var(--accent));}
.logo h1{font-family:'Orbitron',monospace;font-size:1.3rem;font-weight:900;color:var(--accent);text-shadow:var(--glow);letter-spacing:3px;}
.logo span{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text2);letter-spacing:2px;display:block;}
.header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:inline-block;margin-right:6px;box-shadow:0 0 6px var(--warn);transition:all 0.3s;}
.conn-dot.online{background:var(--success);box-shadow:0 0 6px var(--success);}
.conn-dot.error{background:var(--danger);box-shadow:0 0 6px var(--danger);}
.conn-label{font-family:'Share Tech Mono',monospace;font-size:0.7rem;color:var(--text2);}

/* BUTTONS */
.btn{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.85rem;letter-spacing:1px;padding:8px 18px;border:none;cursor:pointer;transition:all 0.2s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);text-transform:uppercase;}
.btn-primary{background:var(--accent);color:var(--bg);}
.btn-primary:hover{background:#33ddff;box-shadow:var(--glow);}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent);clip-path:none;}
.btn-secondary:hover{background:rgba(0,212,255,0.1);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#ff5577;}
.btn-success{background:var(--success);color:var(--bg);}
.btn-success:hover{background:#33ffaa;}
.btn-warn{background:var(--warn);color:var(--bg);}
.btn-sm{padding:5px 12px;font-size:0.78rem;}
.btn:disabled{opacity:0.5;cursor:not-allowed;}

/* MAIN */
main{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:2rem;}

/* TABS */
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid var(--border);}
.tab{font-family:'Orbitron',monospace;font-size:0.75rem;font-weight:700;letter-spacing:2px;padding:14px 28px;cursor:pointer;color:var(--text2);border:none;background:transparent;position:relative;transition:all 0.2s;text-transform:uppercase;}
.tab.active{color:var(--accent);}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;width:100%;height:2px;background:var(--accent);box-shadow:var(--glow);}
.tab:hover:not(.active){color:var(--text);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:0.65rem;font-family:'Share Tech Mono',monospace;margin-left:8px;background:rgba(0,212,255,0.15);color:var(--accent);}

/* CONTROLS */
.controls-bar{display:flex;gap:12px;margin-bottom:1.5rem;align-items:center;flex-wrap:wrap;}
.search-box{position:relative;flex:1;min-width:250px;}
.search-box input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 16px 10px 42px;font-family:'Rajdhani',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--text2);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text2);font-size:1rem;}
.filter-select{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 14px;font-family:'Rajdhani',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;}

/* GRID */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:1.5rem;}

/* CARD */
.project-card{background:var(--panel);border:1px solid var(--border);position:relative;overflow:hidden;transition:all 0.3s;cursor:pointer;}
.project-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent);}
.project-card.delivered::before{background:var(--success);}
.project-card.delivered{opacity:0.8;}
.project-card:hover{border-color:var(--accent);box-shadow:var(--glow);transform:translateY(-2px);}
.card-header{padding:1rem 1.2rem 0.8rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;}
.card-id{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text2);margin-bottom:4px;}
.card-name{font-family:'Orbitron',monospace;font-size:0.95rem;font-weight:700;color:var(--text);}
.status-badge{font-family:'Share Tech Mono',monospace;font-size:0.65rem;padding:4px 10px;letter-spacing:1px;text-transform:uppercase;}
.status-active{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.3);}
.status-delivered{background:rgba(0,255,136,0.1);color:var(--success);border:1px solid rgba(0,255,136,0.3);}
.card-body{padding:1rem 1.2rem;}
.card-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
.meta-label{font-size:0.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.meta-value{font-family:'Share Tech Mono',monospace;font-size:0.85rem;color:var(--accent);}
.progress-section{margin-bottom:0.8rem;}
.progress-label{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--text2);margin-bottom:4px;}
.progress-bar{height:6px;background:var(--bg3);overflow:hidden;}
.progress-fill{height:100%;transition:width 0.5s ease;}
.progress-fill.low{background:var(--danger);}
.progress-fill.mid{background:var(--warn);}
.progress-fill.high{background:var(--success);}
.mat-indicators{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:0.8rem;}
.mat-dot{width:10px;height:10px;border-radius:50%;}
.mat-dot.green{background:var(--success);box-shadow:0 0 6px var(--success);}
.mat-dot.yellow{background:var(--warn);box-shadow:0 0 6px var(--warn);}
.mat-dot.red{background:var(--danger);box-shadow:0 0 6px var(--danger);}
.card-footer{padding:0.8rem 1.2rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/* CARD PRODUCTION MINI PIPELINE */
.card-pipeline{display:flex;gap:4px;align-items:center;margin-bottom:0.8rem;flex-wrap:wrap;}
.pipe-step{font-family:'Share Tech Mono',monospace;font-size:0.58rem;padding:2px 7px;border-radius:2px;letter-spacing:0.5px;white-space:nowrap;}
.pipe-step.done{background:rgba(0,255,136,0.15);color:var(--success);border:1px solid rgba(0,255,136,0.3);}
.pipe-step.pending{background:rgba(26,47,74,0.6);color:var(--text2);border:1px solid var(--border);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(7,11,18,0.9);z-index:1000;overflow-y:auto;padding:2rem;}
.modal-overlay.show{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--panel);border:1px solid var(--border);width:100%;max-width:950px;position:relative;animation:modalIn 0.3s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.modal-header{padding:1.5rem 2rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,rgba(0,212,255,0.05) 0%,transparent 100%);}
.modal-title{font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:2px;text-transform:uppercase;}
.modal-close{background:none;border:none;color:var(--text2);font-size:1.5rem;cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--danger);}
.modal-body{padding:2rem;}
.modal-footer{padding:1.2rem 2rem;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;background:var(--bg2);flex-wrap:wrap;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:1/-1;}
label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);font-weight:600;}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--bg2);}
textarea{resize:vertical;min-height:80px;}
input:disabled,select:disabled,textarea:disabled{opacity:0.5;cursor:not-allowed;}

/* MATERIALS */
.section-title{font-family:'Orbitron',monospace;font-size:0.75rem;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:1rem;padding-bottom:6px;border-bottom:1px solid rgba(255,107,0,0.2);}
.section-title.blue{color:var(--accent);border-bottom-color:rgba(0,212,255,0.2);}
.section-title.green{color:var(--success);border-bottom-color:rgba(0,255,136,0.2);}
.materials-table{width:100%;border-collapse:collapse;margin-bottom:1.5rem;}
.materials-table th{font-family:'Share Tech Mono',monospace;font-size:0.68rem;letter-spacing:1px;text-transform:uppercase;color:var(--text2);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg3);}
.materials-table td{padding:8px 12px;border-bottom:1px solid rgba(26,47,74,0.5);font-size:0.9rem;}
.materials-table tr:hover td{background:rgba(0,212,255,0.03);}
.qty-needed{font-family:'Share Tech Mono',monospace;color:var(--accent);}
.qty-input-wrap{display:flex;align-items:center;gap:8px;}
.qty-input{width:80px;text-align:center;font-family:'Share Tech Mono',monospace;}
.indicator{width:14px;height:14px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ind-green{background:var(--success);box-shadow:0 0 8px var(--success);}
.ind-yellow{background:var(--warn);box-shadow:0 0 8px var(--warn);}
.ind-red{background:var(--danger);box-shadow:0 0 8px var(--danger);}

/* PRODUCTION STAGES */
.production-stages{margin-bottom:1.5rem;}
.stages-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stage-item{background:var(--bg2);border:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.stage-item:hover:not(.stage-locked){border-color:var(--accent);background:rgba(0,212,255,0.04);}
.stage-item.stage-done{border-color:rgba(0,255,136,0.4);background:rgba(0,255,136,0.05);}
.stage-item.stage-done::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--success);}
.stage-item.stage-locked{cursor:default;opacity:0.6;}
.stage-checkbox{width:20px;height:20px;border:2px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:0.75rem;}
.stage-item.stage-done .stage-checkbox{border-color:var(--success);background:var(--success);color:var(--bg);}
.stage-info{flex:1;min-width:0;}
.stage-name{font-family:'Orbitron',monospace;font-size:0.7rem;font-weight:700;letter-spacing:1px;color:var(--text);text-transform:uppercase;}
.stage-item.stage-done .stage-name{color:var(--success);}
.stage-date{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:var(--text2);margin-top:2px;}
.stage-num{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text2);flex-shrink:0;}
.pipeline-progress{margin-bottom:12px;}
.pipeline-bar{height:4px;background:var(--bg3);overflow:hidden;margin-top:4px;}
.pipeline-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));transition:width 0.5s ease;}
.pipeline-label{display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text2);}

/* COMPENSATION VALUES */
.compensation-section{margin-bottom:1.5rem;}
.compensation-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.comp-drone-card{background:var(--bg2);border:1px solid var(--border);padding:14px;position:relative;}
.comp-drone-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.comp-drone-id-input{font-family:'Share Tech Mono',monospace;font-size:0.8rem;color:var(--accent);background:transparent;border:none;border-bottom:1px solid var(--border);padding:2px 6px;width:100%;outline:none;transition:border-color 0.2s;letter-spacing:1px;}
.comp-drone-id-input:focus{border-bottom-color:var(--accent);}
.comp-drone-id-input::placeholder{color:var(--text2);font-size:0.72rem;letter-spacing:0;}
.comp-drone-id-input:disabled{opacity:0.6;cursor:not-allowed;}
.comp-remove-btn{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;line-height:1;padding:2px 4px;flex-shrink:0;transition:color 0.2s;}
.comp-remove-btn:hover{color:var(--danger);}
.comp-textarea{min-height:90px;font-family:'Share Tech Mono',monospace;font-size:0.8rem;resize:vertical;line-height:1.5;color:var(--text);}
.comp-textarea:focus{border-color:var(--accent);}
.comp-textarea::placeholder{color:var(--text2);font-size:0.75rem;}
.comp-add-row{grid-column:1/-1;display:flex;justify-content:center;padding:6px 0;}
.comp-add-btn{font-family:'Share Tech Mono',monospace;font-size:0.75rem;letter-spacing:1px;color:var(--accent);background:transparent;border:1px dashed rgba(0,212,255,0.3);padding:8px 20px;cursor:pointer;transition:all 0.2s;width:100%;}
.comp-add-btn:hover{border-color:var(--accent);background:rgba(0,212,255,0.05);}
.comp-empty{grid-column:1/-1;color:var(--text2);font-size:0.85rem;padding:12px 0;font-family:'Share Tech Mono',monospace;}

/* COMMENTS */
.comments-section{margin-top:1.5rem;}
.comment-list{margin-bottom:1rem;max-height:200px;overflow-y:auto;}
.comment-item{background:var(--bg2);border-left:3px solid var(--accent2);padding:10px 14px;margin-bottom:8px;}
.comment-date{font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text2);margin-bottom:4px;}
.comment-text{font-size:0.9rem;line-height:1.4;}
.add-comment{display:flex;gap:8px;align-items:flex-end;}
.add-comment textarea{flex:1;min-height:60px;}

/* EMPTY */
.empty-state{text-align:center;padding:5rem 2rem;color:var(--text2);}
.empty-state .icon{font-size:4rem;margin-bottom:1rem;opacity:0.3;}
.empty-state h3{font-family:'Orbitron',monospace;font-size:0.9rem;letter-spacing:2px;color:var(--text2);margin-bottom:0.5rem;}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--panel);border:1px solid var(--border);padding:1rem 1.2rem;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(0,212,255,0.08) 0%,transparent 70%);}
.stat-num{font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;color:var(--accent);line-height:1;margin-bottom:4px;}
.stat-label{font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}

/* MISC */
.delivered-lock{background:rgba(0,255,136,0.05);border:1px solid rgba(0,255,136,0.2);padding:10px 16px;margin-bottom:1rem;font-size:0.85rem;color:var(--success);display:flex;align-items:center;gap:8px;}
.tab-content{display:none;}
.tab-content.active{display:block;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);}
@media(max-width:768px){
  .stats-bar{grid-template-columns:repeat(2,1fr);}
  .form-grid{grid-template-columns:1fr;}
  .stages-grid{grid-template-columns:1fr 1fr;}
  .compensation-grid{grid-template-columns:1fr;}
  header{padding:0 1rem;}
  main{padding:1rem;}
  .projects-grid{grid-template-columns:1fr;}
  .header-actions{gap:6px;}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loader-ring"></div>
  <div class="loader-text">Conectando con Firebase…</div>
</div>

<div id="toast"></div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="21" cy="21" r="4" fill="#00d4ff"/>
        <circle cx="8" cy="8" r="5" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="34" cy="8" r="5" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="8" cy="34" r="5" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="34" cy="34" r="5" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <line x1="13" y1="8" x2="17" y2="17" stroke="#00d4ff" stroke-width="1"/>
        <line x1="29" y1="8" x2="25" y2="17" stroke="#00d4ff" stroke-width="1"/>
        <line x1="13" y1="34" x2="17" y2="25" stroke="#00d4ff" stroke-width="1"/>
        <line x1="29" y1="34" x2="25" y2="25" stroke="#00d4ff" stroke-width="1"/>
      </svg>
    </div>
    <div>
      <h1>WGDrones</h1>
      <span>Sistema de Gestión de Proyectos</span>
    </div>
  </div>
  <div class="header-actions">
    <div style="display:flex;align-items:center;">
      <span class="conn-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">Conectando…</span>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="exportBackup()">⬇ Respaldo</button>
    <label class="btn btn-secondary btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;">
      ⬆ Cargar Respaldo
      <input type="file" accept=".json" onchange="importBackup(event)" style="display:none">
    </label>
    <button class="btn btn-primary" onclick="openNewProject()">+ Nuevo Proyecto</button>
  </div>
</header>

<main>
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Total Proyectos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-active" style="color:var(--accent)">—</div>
      <div class="stat-label">Activos</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-delivered" style="color:var(--success)">—</div>
      <div class="stat-label">Entregados</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('activos')">
      Proyectos Activos <span class="tab-badge" id="badge-activos">0</span>
    </button>

// ── State ──
let projects = [];

// ── Helpers ──
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
function setConn(state) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  if (state==='online')  { dot.className='conn-dot online'; lbl.textContent='Firebase — En línea'; }
  else if (state==='error') { dot.className='conn-dot error'; lbl.textContent='Sin conexión'; }
  else { dot.className='conn-dot'; lbl.textContent='Conectando…'; }
}
function hideLoading() {
  const ls = document.getElementById('loading-screen');
  ls.classList.add('hide');
  setTimeout(()=>ls.style.display='none', 400);
}
function formatDate(d) {
  if (!d) return '—';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}
function getComponents(droneType, droneQty) {
  const type = DRONE_TYPES[droneType];
  if (!type) return [];
  return type.components.map(c => ({
    ...c,
    needed: droneQty * (c.perDrone || 1)
  }));
}
function getMaterialProgress(p) {
  const comps = getComponents(p.droneType, p.droneQty);
  if (!comps.length) return {pct:0,green:0,yellow:0,red:0,total:0};
  let g=0,y=0,r=0;
  comps.forEach(c=>{
    const have=parseInt((p.materials||{})[c.id]||0);
    const pct=c.needed===0?1:have/c.needed;
    if(pct>=1)g++; else if(pct>=0.5)y++; else r++;
  });
  return {pct:Math.round((g/comps.length)*100),green:g,yellow:y,red:r,total:comps.length};
}
function getProductionProgress(stages) {
  if(!stages) return {done:0,total:PRODUCTION_STAGES.length};
  const done = PRODUCTION_STAGES.filter(s=>stages[s.id]?.done).length;
  return {done, total:PRODUCTION_STAGES.length};
}
function escHtml(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// ── Firestore ops ──
async function saveToFS(project) {
  try { await setDoc(doc(db, COL, project.id), project); }
  catch(e) { toast('Error al guardar: '+e.message,'error'); throw e; }
}
async function deleteFromFS(id) {
  try { await deleteDoc(doc(db, COL, id)); }
  catch(e) { toast('Error al eliminar: '+e.message,'error'); throw e; }
}

// ── Real-time listener ──
onSnapshot(collection(db, COL), (snap) => {
  projects = snap.docs.map(d => d.data());
  setConn('online');
  hideLoading();
  renderProjects();
}, (err) => {
  console.error(err);
  setConn('error');
  hideLoading();
  toast('Error Firebase: '+err.message,'error');
});

// ── Tabs ──
window.switchTab = (tab) => {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='activos')||(i===1&&tab==='entregados')));
  document.querySelectorAll('.tab-content').forEach(tc=>tc.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderProjects();
};

// ── Render ──
function updateStats() {
  const active    = projects.filter(p=>!p.delivered).length;
  const delivered = projects.filter(p=>p.delivered).length;
  document.getElementById('stat-total').textContent     = projects.length;
  document.getElementById('stat-active').textContent    = active;
  document.getElementById('stat-delivered').textContent = delivered;
  document.getElementById('badge-activos').textContent    = active;
  document.getElementById('badge-entregados').textContent = delivered;
}

function renderProjects() {
  updateStats();
  const search = document.getElementById('search-input').value.toLowerCase();
  const ftype  = document.getElementById('filter-type').value;
  ['activos','entregados'].forEach(tab => {
    const isDel = tab==='entregados';
    let list = projects.filter(p=>p.delivered===isDel);
    if(search) list=list.filter(p=>p.name.toLowerCase().includes(search)||p.id.toLowerCase().includes(search)||(p.droneType||'').toLowerCase().includes(search));
    if(ftype)  list=list.filter(p=>p.droneType===ftype);
    const grid=document.getElementById(`grid-${tab}`);
    const empty=document.getElementById(`empty-${tab}`);
    grid.innerHTML='';
    if(!list.length){ empty.style.display='block'; }
    else { empty.style.display='none'; list.forEach(p=>grid.appendChild(createCard(p))); }
  });
}

function createCard(p) {
  const card=document.createElement('div');
  card.className=`project-card ${p.delivered?'delivered':''}`;
  const prog=getMaterialProgress(p);
  const progCls=prog.pct>=80?'high':prog.pct>=40?'mid':'low';
  const comps=getComponents(p.droneType,p.droneQty);
  const ti=DRONE_TYPES[p.droneType]||{};
  let dots='';
  comps.forEach(c=>{
    const have=parseInt((p.materials||{})[c.id]||0);
    const pct=c.needed===0?1:have/c.needed;
    dots+=`<div class="mat-dot ${pct>=1?'green':pct>=0.5?'yellow':'red'}" title="${c.name}: ${have}/${c.needed}"></div>`;
  });

  // Mini pipeline for card
  const pp = getProductionProgress(p.productionStages);
  let pipeHtml = PRODUCTION_STAGES.map(s=>{
    const done = p.productionStages?.[s.id]?.done;
    return `<span class="pipe-step ${done?'done':'pending'}" title="${s.name}">${s.icon} ${s.name}</span>`;
  }).join('');

  card.innerHTML=`
    <div class="card-header">
      <div><div class="card-id">${p.id}</div><div class="card-name">${p.name}</div></div>
      <span class="status-badge ${p.delivered?'status-delivered':'status-active'}">${p.delivered?'✓ Entregado':'◉ Activo'}</span>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <div class="meta-item"><div class="meta-label">Tipo de Dron</div><div class="meta-value">${ti.icon||'🚁'} ${p.droneType||'—'}</div></div>
        <div class="meta-item"><div class="meta-label">Cantidad</div><div class="meta-value">${p.droneQty||0} uds.</div></div>
        <div class="meta-item"><div class="meta-label">Inicio</div><div class="meta-value">${formatDate(p.startDate)}</div></div>
        <div class="meta-item"><div class="meta-label">${p.delivered?'Entregado':'Entrega Est.'}</div><div class="meta-value">${formatDate(p.deliveryDate)}</div></div>
      </div>
      <div class="progress-section">
        <div class="progress-label"><span>Materiales</span><span>${prog.green}/${prog.total} completos</span></div>
        <div class="progress-bar"><div class="progress-fill ${progCls}" style="width:${prog.pct}%"></div></div>
      </div>
      <div class="mat-indicators">${dots}</div>
      <div class="progress-section" style="margin-bottom:0.5rem">
        <div class="progress-label"><span>Producción</span><span>${pp.done}/${pp.total} etapas</span></div>
        <div class="progress-bar"><div class="progress-fill ${pp.done===pp.total?'high':pp.done>0?'mid':'low'}" style="width:${Math.round(pp.done/pp.total*100)}%"></div></div>
      </div>
      <div class="card-pipeline">${pipeHtml}</div>
    </div>
    <div class="card-footer">
      ${p.delivered
        ?`<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();downloadPDF('${p.id}')">⬇ PDF</button>
           <button class="btn btn-sm" style="background:var(--bg3);color:var(--text2);" onclick="event.stopPropagation();openProjectView('${p.id}')">👁 Ver</button>`
        :`<button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();openProjectView('${p.id}')">✏ Editar</button>
          <button class="btn btn-success btn-sm" onclick="event.stopPropagation();markDelivered('${p.id}')">✓ Entregar</button>`
      }
    </div>`;
  card.addEventListener('click',()=>openProjectView(p.id));
  return card;
}

// ── Modal ──

  currentProjectId = null;
  window._tempComments = [];
  _compEntries = [{droneId:'', values:''}]; // default 1 drone
  document.getElementById('modal-title').textContent='NUEVO PROYECTO';
  renderModalForm(null);
  document.getElementById('project-modal').classList.add('show');
};

window.openProjectView = (id) => {
  currentProjectId = id;
  window._tempComments = [];
  const p=projects.find(x=>x.id===id);
  if(!p) return;
  initCompEntries(p);
  document.getElementById('modal-title').textContent=p.delivered?`PROYECTO: ${p.name}`:`EDITAR: ${p.name}`;
  renderModalForm(p);
  document.getElementById('project-modal').classList.add('show');
};

function renderModalForm(project) {
  const locked=project&&project.delivered;
  const droneType=project?.droneType||'';
  const droneQty=project?.droneQty||1;

  const pp = getProductionProgress(stages);
  const pct = Math.round(pp.done/pp.total*100);

    const isDone = stages[s.id]?.done;
    const doneDate = stages[s.id]?.date||'';

      <div class="stage-item ${isDone?'stage-done':''} ${locked?'stage-locked':''}"

        </div>
        <div class="stage-num">${String(i+1).padStart(2,'0')}</div>
      </div>`;
  }).join('');

  // Compensation cards HTML (custom IDs, dynamic)
  const compEntries = _compEntries;
  let compHtml = renderCompGrid(compEntries, locked);

  document.getElementById('modal-body').innerHTML=`
    ${locked?'<div class="delivered-lock">🔒 Proyecto entregado — solo lectura</div>':''}

    <div class="form-grid">
      <div class="form-group">
        <label>ID del Proyecto *</label>

          <select id="f-id-prefix" style="width:90px;flex-shrink:0;" ${locked?'disabled':''}>
            <option value="MX"  ${idPrefix==='MX' ?'selected':''}>MX</option>
            <option value="ESP" ${idPrefix==='ESP'?'selected':''}>ESP</option>
          </select>
          <input type="text" id="f-id-num" value="${idNum}" placeholder="Ej: 001, 2025-01…" ${locked?'disabled':''} style="flex:1;">
        </div>
      </div>
      <div class="form-group">
        <label>Nombre del Proyecto *</label>
        <input type="text" id="f-name" value="${project?.name||''}" placeholder="Ej: Proyecto Racer Q1-2025" ${locked?'disabled':''}>
      </div>
      <div class="form-group">
        <label>Tipo de Dron *</label>
        <select id="f-type" onchange="onTypeChange()" ${locked?'disabled':''}>
          <option value="">— Seleccionar tipo —</option>
          ${Object.entries(DRONE_TYPES).map(([k,v])=>`<option value="${k}" ${droneType===k?'selected':''}>${v.icon} ${k}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Cantidad de Drones *</label>

      <div class="form-group">
        <label>Fecha de Inicio</label>
        <input type="date" id="f-start" value="${project?.startDate||''}" ${locked?'disabled':''}>
      </div>
      <div class="form-group">
        <label>Fecha de Entrega Estimada</label>

      <div class="section-title">Materiales Requeridos</div>

        <thead><tr><th>Componente</th><th>Necesario</th><th>Disponible</th><th>Estado</th></tr></thead>

  footer.innerHTML='';
  if(locked){
    footer.innerHTML=`<button class="btn btn-secondary" onclick="downloadPDF('${project.id}')">⬇ Descargar PDF</button><button class="btn btn-primary" onclick="closeModal()">Cerrar</button>`;
  } else if(!project){
    footer.innerHTML=`<button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveProject()">Guardar Proyecto</button>`;
  } else {
    footer.innerHTML=`
      <button class="btn btn-danger btn-sm" onclick="deleteProject('${project.id}')">🗑 Eliminar</button>
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-warn" onclick="saveProject()">💾 Guardar Cambios</button>
      <button class="btn btn-success" onclick="markDelivered('${project.id}')">✓ Marcar Entregado</button>`;
  }
}

// ── Toggle production stage (checkbox) ──
window.toggleStage = (stageId) => {
  const item = document.getElementById(`stage-item-${stageId}`);
  const check = document.getElementById(`stage-check-${stageId}`);
  if(!item || !check) return;
  const isDone = item.classList.contains('stage-done');
  if(isDone){
    item.classList.remove('stage-done');
    check.textContent='';
    item.querySelector('.stage-date').textContent='Pendiente';
  } else {
    item.classList.add('stage-done');
    check.textContent='✓';
    const now = new Date().toLocaleString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    item.querySelector('.stage-date').textContent=now;
  }
  updatePipelineBar();
};

function updatePipelineBar(){
  const done = PRODUCTION_STAGES.filter(s=>document.getElementById(`stage-item-${s.id}`)?.classList.contains('stage-done')).length;
  const total = PRODUCTION_STAGES.length;
  const pct = Math.round(done/total*100);
  const fill = document.getElementById('pipeline-bar-fill');
  const label = document.getElementById('pipeline-pct-label');
  if(fill) fill.style.width=pct+'%';
  if(label) label.textContent=`${done}/${total} etapas completadas`;
}

function collectProductionStages(){
  const result={};
  PRODUCTION_STAGES.forEach(s=>{
    const item=document.getElementById(`stage-item-${s.id}`);
    const dateEl=item?.querySelector('.stage-date');
    const isDone=item?.classList.contains('stage-done')||false;
    result[s.id]={done:isDone,date:isDone?(dateEl?.textContent||''):''};
  });
  return result;
}

function collectCompensation(){
  const type=document.getElementById('f-type')?.value;
  const qty=parseInt(document.getElementById('f-qty')?.value||1);
  if(!type) return {};
  const result={};
  for(let i=1;i<=qty;i++){
    const key=`drone_${i}`;
    const el=document.getElementById(`comp-${key}`);
    result[key]=el?.value||'';
  }
  return result;
}

// ── Compensation: render helpers ──
function renderCompGrid(entries, locked){
  if(!entries.length){
    return `<div class="comp-empty">Sin drones configurados en este proyecto.</div>`;
  }
  return entries.map((entry,i)=>`
    <div class="comp-drone-card" data-comp-idx="${i}">
      <div class="comp-drone-header">
        <span style="font-family:'Share Tech Mono',monospace;font-size:0.65rem;color:var(--text2);flex-shrink:0;">ID:</span>
        <input type="text" class="comp-drone-id-input" placeholder="Ej: 001, A-12, #5…" value="${escAttr(entry.droneId||'')}" ${locked?'disabled':''} oninput="syncCompId(${i},this.value)">
      </div>
      <textarea class="comp-textarea" placeholder="Ej:&#10;Roll: 0.00&#10;Pitch: 0.00&#10;Yaw: 0.00&#10;Accel X: 0.000…" ${locked?'disabled':''}>${escHtml(entry.values||'')}</textarea>
    </div>`).join('');
}

function escAttr(t){ return String(t).replace(/"/g,'&quot;'); }

// In-memory compensation list during editing
let _compEntries = [];

window.syncCompId = (idx, val) => {
  if(_compEntries[idx]) _compEntries[idx].droneId = val;
};

function refreshCompGrid(locked){
  const grid=document.getElementById('comp-grid');
  if(!grid) return;
  // Save current textarea values before re-render
  _compEntries.forEach((e,i)=>{
    const ta=grid.querySelector(`[data-comp-idx="${i}"] .comp-textarea`);
    if(ta) e.values=ta.value;
  });
  grid.innerHTML=renderCompGrid(_compEntries,locked);
}

function collectCompensation(){
  const grid=document.getElementById('comp-grid');
  if(!grid) return [];
  // Sync latest textarea values
  _compEntries.forEach((e,i)=>{
    const card=grid.querySelector(`[data-comp-idx="${i}"]`);
    if(card){
      const idInput=card.querySelector('.comp-drone-id-input');
      const ta=card.querySelector('.comp-textarea');
      if(idInput) e.droneId=idInput.value;
      if(ta) e.values=ta.value;
    }
  });
  return _compEntries.filter(e=>e.droneId||e.values);
}

// Reinitialize _compEntries when modal opens
function initCompEntries(project){
  const qty = project?.droneQty || 1;
  const raw = project?.compensation;
  if(Array.isArray(raw) && raw.length){
    // Fill up to qty, keeping existing data
    _compEntries = Array.from({length: qty}, (_,i) => ({
      droneId: raw[i]?.droneId ?? '',
      values:  raw[i]?.values  ?? ''
    }));
  } else if(raw && typeof raw==='object' && !Array.isArray(raw)){
    // Migrate old format
    const entries = Object.entries(raw).map(([k,v])=>({droneId:k.replace('drone_','Dron #'),values:v}));
    _compEntries = Array.from({length: qty}, (_,i) => entries[i] || {droneId:'',values:''});
  } else {
    _compEntries = Array.from({length: qty}, () => ({droneId:'', values:''}));
  }
}

// ── Re-render compensation when qty changes (no longer auto-generates, just keeps existing) ──
function reRenderCompensation(locked){
  refreshCompGrid(locked);
}

function renderMaterials(droneType,droneQty,existing,locked){
  const comps=getComponents(droneType,droneQty);
  const tbody=document.getElementById('mat-tbody');
  if(!tbody) return;
  tbody.innerHTML='';
  comps.forEach(c=>{
    const have=parseInt(existing[c.id]||0);
    const pct=c.needed===0?1:have/c.needed;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${c.name} <small style="color:var(--text2)">(${c.unit})</small></td>
      <td class="qty-needed">${c.needed}</td>
      <td><div class="qty-input-wrap"><input type="number" class="qty-input" id="mat-${c.id}" value="${have}" min="0" max="9999" ${locked?'disabled':''} oninput="updateMatIndicator('${c.id}',${c.needed})"></div></td>
      <td><span class="indicator ${pct>=1?'ind-green':pct>=0.5?'ind-yellow':'ind-red'}" id="ind-${c.id}"></span></td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('materials-section').style.display='block';
}

window.updateMatIndicator=(compId,needed)=>{
  const val=parseInt(document.getElementById(`mat-${compId}`)?.value||0);
  const ind=document.getElementById(`ind-${compId}`);
  if(!ind) return;
  const pct=needed===0?1:val/needed;
  ind.className='indicator '+(pct>=1?'ind-green':pct>=0.5?'ind-yellow':'ind-red');
};

window.onTypeChange=()=>{
  const type=document.getElementById('f-type')?.value;
  const qty=parseInt(document.getElementById('f-qty')?.value||1);
  if(type){
    renderMaterials(type,qty,collectMaterials(),false);
  } else {
    document.getElementById('materials-section').style.display='none';
  }
};

window.onQtyChange=()=>{
  const type=document.getElementById('f-type')?.value;
  const qty=parseInt(document.getElementById('f-qty')?.value||1);
  // Resize _compEntries to match new qty (preserve existing, trim or pad)
  if(qty > _compEntries.length){
    while(_compEntries.length < qty) _compEntries.push({droneId:'',values:''});
  } else if(qty < _compEntries.length){
    _compEntries = _compEntries.slice(0, qty);
  }
  refreshCompGrid(false);
  if(type) renderMaterials(type,qty,collectMaterials(),false);
};

function collectMaterials(){
  const type=document.getElementById('f-type')?.value;
  const qty=parseInt(document.getElementById('f-qty')?.value||1);
  if(!type) return {};
  const result={};
  getComponents(type,qty).forEach(c=>{ const el=document.getElementById(`mat-${c.id}`); result[c.id]=parseInt(el?.value||0); });
  return result;
}

function renderComments(comments,locked){
  const list=document.getElementById('comment-list');
  if(!list) return;
  list.innerHTML='';
  if(!comments.length){ list.innerHTML='<div style="color:var(--text2);font-size:0.85rem;padding:8px 0;">Sin comentarios aún.</div>'; return; }
  comments.forEach(c=>{
    const div=document.createElement('div');
    div.className='comment-item';
    div.innerHTML=`<div class="comment-date">${c.date}</div><div class="comment-text">${escHtml(c.text)}</div>`;
    list.appendChild(div);
  });
  list.scrollTop=list.scrollHeight;
}

window.addComment=async()=>{
  const ta=document.getElementById('new-comment');
  const text=ta?.value.trim();
  if(!text) return;
  const comment={date:new Date().toLocaleString('es-MX'),text};
  if(currentProjectId){
    const p=projects.find(x=>x.id===currentProjectId);
    if(p){
      const updated={...p,comments:[...(p.comments||[]),comment]};
      await saveToFS(updated);
      toast('Comentario guardado.','success');
      ta.value='';
      renderComments(updated.comments,false);
    }
  } else {
    if(!window._tempComments) window._tempComments=[];
    window._tempComments.push(comment);
    renderComments(window._tempComments,false);
    ta.value='';
  }
};

window.saveProject=async()=>{
  const idPrefix  =document.getElementById('f-id-prefix')?.value;
  const idNum     =document.getElementById('f-id-num')?.value.trim();
  const name      =document.getElementById('f-name')?.value.trim();
  const droneType =document.getElementById('f-type')?.value;
  const droneQty  =parseInt(document.getElementById('f-qty')?.value||1);
  const startDate =document.getElementById('f-start')?.value;
  const deliveryDate=document.getElementById('f-delivery')?.value;

  if(!idNum)     { toast('El número de ID es requerido.','error'); return; }
  if(!name)      { toast('El nombre del proyecto es requerido.','error'); return; }
  if(!droneType) { toast('Selecciona un tipo de dron.','error'); return; }
  if(droneQty<1) { toast('La cantidad debe ser al menos 1.','error'); return; }

  const fullId=`${idPrefix}-${idNum}`;
  const dup=projects.find(x=>x.id===fullId&&x.id!==currentProjectId);
  if(dup){ toast(`El ID "${fullId}" ya está en uso por "${dup.name}".`,'error'); return; }

  const materials=collectMaterials();
  const productionStages=collectProductionStages();
  const compensation=collectCompensation();

  try {
    if(currentProjectId){
      const p=projects.find(x=>x.id===currentProjectId);
      if(p){
        const updated={...p,id:fullId,name,droneType,droneQty,startDate,deliveryDate,materials,productionStages,compensation,updatedAt:new Date().toISOString()};
        await saveToFS(updated);
        if(fullId !== currentProjectId) await deleteFromFS(currentProjectId);
        toast('Proyecto actualizado en Firebase.','success');
      }
    } else {
      const np={id:fullId,name,droneType,droneQty,startDate,deliveryDate,materials,productionStages,compensation,delivered:false,
        comments:window._tempComments||[],createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
      window._tempComments=[];
      await saveToFS(np);
      toast('Proyecto creado en Firebase.','success');
    }
    closeModal();
  } catch(e){ /* toast already shown */ }
};

window.markDelivered=async(id)=>{
  if(!confirm('¿Marcar este proyecto como entregado? No podrá modificarse después.')) return;
  const p=projects.find(x=>x.id===id);
  if(p){
    await saveToFS({...p,delivered:true,deliveredAt:new Date().toISOString()});
    toast('¡Proyecto entregado! Generando PDF…','success');
    closeModal();
    downloadPDFFromData({...p,delivered:true,deliveredAt:new Date().toISOString()});
  }
};

window.deleteProject=async(id)=>{
  if(!confirm('¿Eliminar este proyecto? Esta acción no se puede deshacer.')) return;
  await deleteFromFS(id);
  toast('Proyecto eliminado.','success');
  closeModal();
};

window.closeModal=()=>{
  document.getElementById('project-modal').classList.remove('show');
  window._tempComments=[];
  currentProjectId=null;
};

// ── PDF ──
function downloadPDFFromData(p) {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const margin=20; let y=margin;
  const checkPage=(need=15)=>{ if(y+need>pageH-margin){doc.addPage();y=margin;} };

  doc.setFillColor(7,11,18); doc.rect(0,0,pageW,40,'F');
  doc.setFontSize(22); doc.setFont('helvetica','bold'); doc.setTextColor(0,212,255);
  doc.text('WGDrones',margin,18);
  doc.setFontSize(10); doc.setFont('helvetica','normal'); doc.setTextColor(106,138,170);
  doc.text('Sistema de Gestión de Proyectos',margin,26);
  doc.setFontSize(9); doc.setTextColor(150,170,190);
  doc.text(`Generado: ${new Date().toLocaleString('es-MX')}`,pageW-margin,18,{align:'right'});
  doc.text(`ID: ${p.id}`,pageW-margin,26,{align:'right'});
  y=50;

  doc.setFillColor(13,20,40); doc.rect(margin-2,y-7,pageW-2*margin+4,14,'F');
  doc.setFontSize(16); doc.setFont('helvetica','bold'); doc.setTextColor(240,248,255);
  doc.text(p.name,margin,y);
  doc.setFontSize(9); doc.setTextColor(p.delivered?0:0,p.delivered?200:212,p.delivered?100:255);
  doc.text(p.delivered?'ENTREGADO':'ACTIVO',pageW-margin,y,{align:'right'});
  y+=16;

  doc.autoTable({startY:y,head:[['Campo','Valor']],body:[
    ['Nombre del Proyecto',p.name],['ID del Proyecto',p.id],['Tipo de Dron',p.droneType],
    ['Cantidad de Drones',`${p.droneQty} unidades`],['Fecha de Inicio',formatDate(p.startDate)],
    ['Fecha Entrega Estimada',formatDate(p.deliveryDate)],
    ['Fecha Entrega Real',p.deliveredAt?new Date(p.deliveredAt).toLocaleDateString('es-MX'):'—'],
    ['Estado',p.delivered?'Entregado':'Activo']
  ],theme:'grid',headStyles:{fillColor:[13,20,40],textColor:[0,212,255],fontStyle:'bold'},
  styles:{fontSize:9,cellPadding:3},alternateRowStyles:{fillColor:[240,245,252]},margin:{left:margin,right:margin}});
  y=doc.lastAutoTable.finalY+10; checkPage(20);

  // Materials
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(255,107,0);
  doc.text('Materiales del Proyecto',margin,y); y+=6;
  const comps=getComponents(p.droneType,p.droneQty);
  doc.autoTable({startY:y,
    head:[['Componente','Unidad','Necesario','Disponible','Cobertura','Estado']],
    body:comps.map(c=>{
      const have=parseInt((p.materials||{})[c.id]||0);
      const pct=c.needed===0?1:have/c.needed;
      return[c.name,c.unit,c.needed,have,`${Math.min(100,Math.round(pct*100))}%`,pct>=1?'Completo':pct>=0.5?'Parcial':'Faltante'];
    }),
    theme:'grid',headStyles:{fillColor:[13,20,40],textColor:[255,107,0],fontStyle:'bold'},
    styles:{fontSize:8,cellPadding:2.5},alternateRowStyles:{fillColor:[240,245,252]},
    columnStyles:{2:{halign:'center'},3:{halign:'center'},4:{halign:'center'},5:{halign:'center'}},
    didParseCell:(data)=>{
      if(data.column.index===5&&data.section==='body'){
        if(data.cell.raw==='Completo') data.cell.styles.textColor=[0,160,80];
        else if(data.cell.raw==='Parcial') data.cell.styles.textColor=[180,120,0];
        else data.cell.styles.textColor=[200,0,50];
      }
    },margin:{left:margin,right:margin}});
  y=doc.lastAutoTable.finalY+10; checkPage(20);

  // Production stages
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(0,212,255);
  doc.text('Estado de Producción',margin,y); y+=6;
  const stagesData = PRODUCTION_STAGES.map(s=>{
    const s2=p.productionStages?.[s.id]||{};
    return[s.icon+' '+s.name,s2.done?'✓ Completado':'Pendiente',s2.date||'—'];
  });
  doc.autoTable({startY:y,head:[['Etapa','Estado','Fecha']],body:stagesData,
    theme:'grid',headStyles:{fillColor:[13,20,40],textColor:[0,212,255],fontStyle:'bold'},
    styles:{fontSize:8,cellPadding:3},alternateRowStyles:{fillColor:[240,245,252]},
    didParseCell:(data)=>{
      if(data.column.index===1&&data.section==='body'){
        data.cell.styles.textColor=data.cell.raw.includes('✓')?[0,160,80]:[150,150,150];
      }
    },margin:{left:margin,right:margin}});
  y=doc.lastAutoTable.finalY+10; checkPage(20);

  // Compensation values
  const compArr = Array.isArray(p.compensation) ? p.compensation : Object.entries(p.compensation||{}).map(([k,v])=>({droneId:k.replace('drone_','Dron #'),values:v}));
  const compRows = compArr.filter(e=>e.droneId||e.values).map(e=>[e.droneId||'—',e.values||'']);
  if(compRows.length){
      doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(0,200,100);
      doc.text('Valores de Compensación',margin,y); y+=6;
      doc.autoTable({startY:y,head:[['Dron','Valores']],body:compRows,
        theme:'grid',headStyles:{fillColor:[13,20,40],textColor:[0,200,100],fontStyle:'bold'},
        styles:{fontSize:8,cellPadding:3},alternateRowStyles:{fillColor:[240,245,252]},
        columnStyles:{1:{cellWidth:'auto'}},margin:{left:margin,right:margin}});
      y=doc.lastAutoTable.finalY+10; checkPage(20);
  }

  if(p.comments&&p.comments.length){
    doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(0,212,255);
    doc.text('Comentarios del Proyecto',margin,y); y+=6;
    doc.autoTable({startY:y,head:[['Fecha','Comentario']],body:p.comments.map(c=>[c.date,c.text]),
      theme:'grid',headStyles:{fillColor:[13,20,40],textColor:[0,212,255],fontStyle:'bold'},
      styles:{fontSize:8,cellPadding:3},columnStyles:{0:{cellWidth:45}},
      alternateRowStyles:{fillColor:[240,245,252]},margin:{left:margin,right:margin}});
  }

  const tot=doc.internal.getNumberOfPages();
  for(let i=1;i<=tot;i++){
    doc.setPage(i); doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(150);
    doc.text(`WGDrones — ${p.name} — Pág. ${i}/${tot}`,pageW/2,pageH-10,{align:'center'});
  }
  doc.save(`WGDrones_${p.name.replace(/[^a-z0-9]/gi,'_')}_${p.id}.pdf`);
}

window.downloadPDF=(id)=>{
  const p=projects.find(x=>x.id===id);
  if(!p) { toast('Proyecto no encontrado.','error'); return; }
  downloadPDFFromData(p);
};

// ── Backup ──
window.exportBackup=()=>{
  const blob=new Blob([JSON.stringify({version:'2.0',exportDate:new Date().toISOString(),projects},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`WGDrones_Respaldo_${new Date().toISOString().slice(0,10)}.json`; a.click();
  toast('Respaldo descargado.','success');
};

window.importBackup=async(event)=>{
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.projects||!Array.isArray(data.projects)){ toast('Archivo de respaldo inválido.','error'); return; }
      if(!confirm(`¿Importar ${data.projects.length} proyectos a Firebase? Los que ya existan (mismo ID) serán omitidos.`)) return;
      const existingIds=new Set(projects.map(p=>p.id));
      let added=0;
      for(const p of data.projects){ if(!existingIds.has(p.id)){ await saveToFS(p); added++; } }
      toast(`${added} proyectos importados a Firebase.`,'success');
    } catch{ toast('Error al leer el archivo.','error'); }
  };
  reader.readAsText(file);
  event.target.value='';
};

// ── Init ──
document.getElementById('project-modal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });
</script>
